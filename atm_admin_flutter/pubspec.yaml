name: atm_admin
description: Asia Alliance Bank - Smart ATM Admin Panel
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  # HTTP & WebSocket
  http: ^1.2.0
  web_socket_channel: ^2.4.0
  # State management
  provider: ^6.1.2
  # Push notifications
  firebase_core: ^3.3.0
  firebase_messaging: ^15.1.0
  flutter_local_notifications: ^17.2.2
  # UI
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10
  cached_network_image: ^3.3.1
  # Storage
  shared_preferences: ^2.3.2
  # Utils
  intl: ^0.19.0
  timeago: ^3.6.1

flutter:
  uses-material-design: true
  assets:
    - assets/






